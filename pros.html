<!DOCTYPE html>
<html>
<head>
    <title>College Registration Portal</title>
</head>
<body>

    <h1>Student Registration Form</h1>
    <p>Please fill out all the details below to apply for the upcoming semester.</p>

    <!-- The Form Wrapper -->
    <form>
        
        <!-- Standard Text Input -->
        <h3>Personal Details</h3>
        <label for="fullName">Full Name:</label>
        <input type="text" id="fullName" name="fullName" required>
        <br><br>

        <!-- Email Input -->
        <label for="email">Email Address:</label>
        <input type="email" id="email" name="email" required>
        <br><br>

        <!-- Date Input -->
        <label for="dob">Date of Birth:</label>
        <input type="date" id="dob" name="dob">
        <br><br>

        <!-- Radio Buttons (Note: They share the same 'name' so you can only pick one) -->
        <label>Gender:</label>
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label>
        
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label>
        
        <input type="radio" id="other" name="gender" value="other">
        <label for="other">Other</label>
        <br><br>

        <!-- Select Dropdown -->
        <h3>Academic Details</h3>
        <label for="course">Select Course:</label>
        <select id="course" name="course">
            <option value="">--Please choose an option--</option>
            <option value="bca">BCA (Bachelor of Computer Applications)</option>
            <option value="mca">MCA (Master of Computer Applications)</option>
            <option value="btech">B.Tech (Computer Science)</option>
        </select>
        <br><br>

        <!-- Textarea -->
        <label for="address">Permanent Address:</label><br>
        <textarea id="address" name="address" rows="4" cols="40"></textarea>
        <br><br>

        <!-- Checkbox -->
        <input type="checkbox" id="terms" name="terms" required>
        <label for="terms">I agree to the college terms and conditions</label>
        <br><br>

        <!-- Submit Button -->
        <button type="submit">Submit Registration</button>

    </form>

</body>
</html>
