<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Search</title>
</head>
<style>
    /* @media(max-width: 768px) {
        width: 20%;
    } */
</style>
<body>
    <div id="result-grid" style="font-family: Arial, sans-serif; margin: 20px; text-align: center;"></div>
</body>
<script>
    let input = prompt("enter the title: ");

    function renderResults(content, isImage = false) {
        const grid = document.getElementById("result-grid");
        if (!grid) return;

        if (isImage) {
            grid.innerHTML += `<br><br><img src="${content}" alt="Anime Poster" style="max-width: 300px; border-radius: 8px;">`;
        } else {
            grid.innerHTML += `<h1>${content}</h1>`;
        }
    }

    async function getAnimeName() {
        try {
            const url = `https://api.jikan.moe/v4/anime?q=${input}`
            const response = await fetch(url)
            if(!response.ok){
                throw new Error("Network response was not OK");
            }
            const data = await response.json();
            
            const grid = document.getElementById("result-grid");
            if(grid) grid.innerHTML = "";

            if(data.data && data.data.length > 0){
                const firstResult = data.data[0];
                
                renderResults(firstResult.title, false);
                renderResults(firstResult.images.jpg.image_url, true);
            } else {
                if(grid) grid.innerHTML = "No anime found for that search term.";
                console.log("no anime found for that search term.");
            }
        } catch (error) {
            console.error("The fetch failed:", error);
            const grid = document.getElementById("result-grid");
            if(grid){
                grid.innerHTML = "Failed to fetch anime. Please try again.";
            }
        }
    }
    
    getAnimeName();
</script>
</html>
